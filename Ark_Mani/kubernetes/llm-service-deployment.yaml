apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service-deployment
  namespace: portfolio-risk
  labels:
    app: llm-service
    tier: ai
spec:
  replicas: 1  # LLM service typically needs fewer replicas due to resource intensity
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
        tier: ai
    spec:
      containers:
      - name: llm-service
        image: portfolio-risk-llm:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: HUGGINGFACE_TOKEN
          valueFrom:
            secretKeyRef:
              name: portfolio-secrets
              key: huggingface-token
        - name: MODEL_NAME
          value: "EleutherAI/gpt-j-6B"
        - name: REDIS_URL
          value: "redis://redis-service:6379/1"
        - name: DEVICE
          value: "cuda"  # Use GPU if available
        - name: MAX_LENGTH
          value: "512"
        - name: TEMPERATURE
          value: "0.7"
        resources:
          requests:
            memory: "8Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1  # Request 1 GPU
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 120  # Model loading takes time
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      nodeSelector:
        accelerator: nvidia-gpu  # Schedule on GPU nodes
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: portfolio-risk
  labels:
    app: llm-service
spec:
  type: ClusterIP
  selector:
    app: llm-service
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-service-hpa
  namespace: portfolio-risk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-service-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
